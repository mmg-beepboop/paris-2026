// --- Password check using SHA-256 ---
var PASS_HASH = "32b65e90d10be5fe14f417bf90f0c4dae45ed75615f7602e66f506085846a617";

async function sha256(str) {
  var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
}

function unlock() {
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("app").classList.add("unlocked");
  renderTabs();
  renderDays();
}

async function tryUnlock() {
  var pw = document.getElementById("pw-input").value;
  var hash = await sha256(pw);
  if (hash === PASS_HASH) {
    localStorage.setItem("paris2026_unlocked", "true");
    unlock();
  } else {
    document.getElementById("pw-error").textContent = "Wrong password â try again";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

// Allow Enter key to submit
document.getElementById("pw-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") tryUnlock();
});

// Auto-focus password field (auto-unlock moved to end of script)
document.getElementById("pw-input").focus();

function mapsSearchUrl(addr) {
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(addr);
}

function mapsRouteUrl(day) {
  var allAddrs = [];
  day.sections.forEach(function(s) { s.stops.forEach(function(st) {
    if (st.addr && st.addr !== "Paris, France") allAddrs.push(st.addr);
  }); });
  if (allAddrs.length < 2) return mapsSearchUrl(allAddrs[0] || "Paris, France");
  var parts = allAddrs.map(function(a) { return encodeURIComponent(a); });
  return "https://www.google.com/maps/dir/" + parts.join("/") + "/";
}

function renderTabs() {
  var container = document.getElementById("dayTabs");
  DAYS.forEach(function(day, i) {
    var tab = document.createElement("div");
    tab.className = "day-tab" + (i === 0 ? " active" : "");
    tab.innerHTML = day.title + '<span class="tab-day">' + day.date + '</span>';
    tab.onclick = function() { switchDay(i); };
    container.appendChild(tab);
  });
}

function switchDay(idx) {
  document.querySelectorAll(".day-tab").forEach(function(t, i) { t.classList.toggle("active", i === idx); });
  document.querySelectorAll(".day-content").forEach(function(c, i) { c.classList.toggle("active", i === idx); });
  document.querySelectorAll(".day-tab")[idx].scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
}

function renderDays() {
  var container = document.getElementById("content");
  DAYS.forEach(function(day, di) {
    var div = document.createElement("div");
    div.className = "day-content" + (di === 0 ? " active" : "");

    var stopNum = 0;
    var totalStops = 0;
    day.sections.forEach(function(s) { totalStops += s.stops.length; });

    var html = '<div class="day-header"><div><h2>' + day.title + '</h2><div class="day-meta">' + day.date + ' &bull; ' + totalStops + ' stops</div></div></div>';
    html += '<div style="font-size:0.85rem;color:#666;margin-bottom:16px;line-height:1.5">' + day.subtitle + '</div>';
    html += '<a class="route-btn" href="' + mapsRouteUrl(day) + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg> Route All Stops in Maps</a>';

    html += '<div class="legend">';
    html += '<div class="legend-item">🥐 Food</div>';
    html += '<div class="legend-item">📍 Sight</div>';
    html += '<div class="legend-item">🧒 Kids</div>';
    html += '<div class="legend-item">🎨 Activity</div>';
    html += '<div class="legend-item">🏨 Hotel</div>';
    html += '<div class="legend-item">🛍️ Shop</div>';
    html += '<div class="legend-item">🚶 Walk</div>';
    html += '</div>';

    day.sections.forEach(function(section) {
      html += '<div class="section-label">' + section.label + '</div>';
      section.stops.forEach(function(stop) {
        stopNum++;
        var catClass = "cat-" + stop.cat;
        var badgeHtml = "";
        if (stop.badge === "reserve") badgeHtml = '<span class="badge badge-reserve">RESERVE</span> ';
        else if (stop.badge === "booked") badgeHtml = '<span class="badge badge-booked">BOOKED</span> ';
        else if (stop.badge === "tip") badgeHtml = '<span class="badge badge-tip">TIP</span> ';
        else if (stop.badge === "time") badgeHtml = '<span class="badge badge-time">TIMED</span> ';

        html += '<div class="stop-card">';
        var EMOJI = { food: "🥐", sight: "📍", kids: "🧒", activity: "🎨", hotel: "🏨", shop: "🛍️", walk: "🚶" };
        html += '<div class="stop-emoji">' + (EMOJI[stop.cat] || stopNum) + '</div>';
        html += '<div class="stop-info">';
        html += badgeHtml;
        html += '<div class="stop-name">' + stop.name + '</div>';
        if (stop.addr && stop.addr !== "Paris, France") html += '<div class="stop-address">' + stop.addr + '</div>';
        if (stop.notes) html += '<div class="stop-notes">' + stop.notes + '</div>';
        html += '</div>';
        if (stop.addr && stop.addr !== "Paris, France") {
          html += '<div class="stop-actions"><a class="nav-link" href="' + mapsSearchUrl(stop.addr) + '" target="_blank" rel="noopener">Map</a></div>';
        }
        html += '</div>';
      });
    });

    div.innerHTML = html;
    container.appendChild(div);
  });
}
